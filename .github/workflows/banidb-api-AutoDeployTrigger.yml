name: Trigger auto deployment for banidb-api-container

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [master]
    paths:
      - '**'
      - '.github/workflows/banidb-api-AutoDeployTrigger.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.BANIDBAPICONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BANIDBAPICONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BANIDBAPICONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: khalis.azurecr.io
          registryUsername: ${{ secrets.BANIDBAPICONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BANIDBAPICONTAINER_REGISTRY_PASSWORD }}
          containerAppName: banidb-api-container
          resourceGroup: devops
          imageToBuild: khalis.azurecr.io/banidb-api:${{ github.sha }}
          buildArguments: |
            NODE_ENV=production
            SSL_CA_LINK=${{ secrets.SSL_CA_LINK }}
